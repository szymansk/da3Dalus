name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Include tests marked 'slow' (CAD E2E workflows, ~5-10 min extra)"
        required: false
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'app/**'
              - 'cad_designer/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'alembic/**'
            frontend:
              - 'frontend/**'

  fast:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Run fast test suite with coverage
        run: |
          poetry run pytest -m "not slow" \
            --tb=short \
            --cov=app \
            --cov=cad_designer \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (eslint)
        run: npm run lint
        working-directory: frontend

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage
        working-directory: frontend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-lcov
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore

  sonarcloud:
    needs: [fast, frontend]
    if: |
      always() &&
      (needs.fast.result == 'success' || needs.fast.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Python coverage report
        if: ${{ needs.fast.result == 'success' }}
        uses: actions/download-artifact@v5
        with:
          name: coverage-xml-py3.12

      - name: Download frontend coverage report
        if: ${{ needs.frontend.result == 'success' }}
        uses: actions/download-artifact@v5
        with:
          name: frontend-coverage-lcov
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  slow:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-slow-${{ hashFiles('poetry.lock') }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run full suite including slow E2E tests
        run: |
          timeout --kill-after=30s 900 \
            poetry run pytest -v -s --capture=no --tb=short
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: "1"
          PYTHONFAULTHANDLER: "1"
