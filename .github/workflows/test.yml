name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Include tests marked 'slow' (CAD E2E workflows, ~5-10 min extra)"
        required: false
        type: boolean
        default: false

jobs:
  fast:
    # Default job: skips slow tests and tests that need the vendored AVL
    # binary. Target amd64 Linux only — CadQuery and Aerosandbox are
    # intentionally excluded on linux/aarch64 via environment markers in
    # pyproject.toml, so an arm64 matrix would fail dependency resolution.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Run fast test suite with coverage
        run: |
          poetry run pytest -m "not slow" \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  slow:
    # Only runs on manual workflow_dispatch with run_slow=true. Contains
    # the heavy end-to-end CAD workflow tests that take 3-10 minutes.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-slow-${{ hashFiles('poetry.lock') }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run full suite including slow E2E tests
        # Runs the full pytest suite (fast + slow marked). After the
        # cad_service.py ProcessPoolExecutor refactor, the previously
        # hanging CAD E2E test should complete within ~3 minutes.
        # Wall-clock SIGKILL after 900s remains as a safety net.
        # Verbose + unbuffered output + faulthandler stay in place for
        # future diagnostic value at basically zero cost.
        run: |
          timeout --kill-after=30s 900 \
            poetry run pytest -v -s --capture=no --tb=short
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUNBUFFERED: "1"
          PYTHONFAULTHANDLER: "1"
