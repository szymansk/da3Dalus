version: '3.9'

services:
  cq-client:
    image: szymanski2adesso/cadquery-client:2.4.0
    container_name: cq-client
    volumes:
      - ./:/home/cadquery/workspace
    stdin_open: true
    entrypoint: "/opt/anaconda/bin/python"
    tty: true
    ports:
      - "8888:8888"
    depends_on:
      - cq-server

  cq-server:
    image: szymanski2adesso/cq-server:amd64
    container_name: cq-server
    platform: linux/amd64    
    command: "run"
    ports:
      - "5050:5000"

  cq-runtime:
    image: szymanski2adesso/cadquery-runtime:2.4.0
    container_name: cq-runtime
    volumes:
      - ./:/home/cadquery/workspace
    stdin_open: true
    entrypoint: "/venv/bin/python"
    tty: true

  cq-jupyter:
    image: bwalter42/jupyter_cadquery:3.5.2
    ports:
      - 8888:8888
    volumes:
      - ./:/home/cq/data
